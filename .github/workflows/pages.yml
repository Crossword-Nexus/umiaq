name: Pages   # Name of this workflow (shows up in Actions tab)

on:
  # Deploy to staging when a version tag is pushed (e.g., v0.1.0, v1.2.3)
  # Also run on PRs to main for testing (build only, no deploy)
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write  # needed to push to gh-pages branch

concurrency:
  # Prevent overlapping runs: if you push twice quickly, the older one cancels.
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    # First job: check out code, build wasm, and upload site files as an artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Extract version from tag (e.g., refs/tags/v0.1.0 -> 0.1.0)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          # Extract version from Cargo.toml
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          # Fail if versions don't match
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ Error: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            echo "Please update Cargo.toml version to match the tag, or use the correct tag."
            exit 1
          fi

          echo "✅ Version validation passed: $TAG_VERSION"

      - name: Validate CHANGELOG updated for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          # Check that CHANGELOG.md contains a section for this version
          if ! grep -qE "^\#\# \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "❌ Error: CHANGELOG.md does not contain a section for version ${TAG_VERSION}"
            echo "Please add a '## [${TAG_VERSION}]' entry to CHANGELOG.md before releasing."
            exit 1
          fi

          echo "✅ CHANGELOG.md contains entry for ${TAG_VERSION}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        # wasm-pack compiles Rust to WebAssembly with the JS shim
        run: |
          curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM into web/pkg
        # Compile your crate to WASM + JS wrapper in web/pkg/
        run: |
          wasm-pack build --release --target web --out-dir web/pkg

      - name: Stage data assets
        # Copy entry list(s) into web/data so the site can fetch them
        run: |
          mkdir -p web/data
          cp -f data/spreadthewordlist.dict web/data/

      - name: Copy README into web
        run: |
          cp README.md web/README.md

      - name: Ensure .nojekyll
        # Make sure Jekyll doesn't interfere with pkg/ folder on Pages
        run: |
          touch web/.nojekyll

      # Build and stage Rust docs
      - name: Build Rust docs
        run: cargo doc --no-deps

      - name: Copy docs into web/docs
        run: |
          mkdir -p web/docs
          cp -r target/doc/* web/docs/

      - name: Deploy to staging
        # Only deploy on tag pushes, not PRs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          destination_dir: staging
          # Preserve the production root (don't wipe it when updating staging)
          keep_files: true
